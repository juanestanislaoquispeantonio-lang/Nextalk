<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexTalk</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d14;
  --sidebar: #111118;
  --surface: #181820;
  --card: #1e1e28;
  --border: rgba(255,255,255,0.06);
  --accent: #7c6aff;
  --accent2: #ff6ab0;
  --accent3: #6affdb;
  --text: #eeeeff;
  --muted: #6b6b8a;
  --online: #4ade80;
  --msg-hover: rgba(255,255,255,0.03);
}
html, body { height: 100%; overflow: hidden; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* ── AUTH SCREEN ── */
#auth-screen {
  position: fixed; inset: 0; z-index: 100;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 0;
}
.auth-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.auth-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: flt 10s ease-in-out infinite; }
.auth-orb-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; }
.auth-orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation-delay: -4s; }
@keyframes flt { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-20px)} }
.auth-card {
  position: relative; z-index: 1;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 40px 36px; width: 360px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  animation: slideUp .6s cubic-bezier(.22,1,.36,1) both;
}
.auth-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3)); border-radius:24px 24px 0 0; }
@keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
.auth-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; justify-content:center; }
.auth-logo-icon { width:40px; height:40px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.auth-logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.auth-tabs { display:flex; background:var(--surface); border-radius:10px; padding:3px; margin-bottom:24px; }
.auth-tab { flex:1; padding:8px; border:none; background:transparent; color:var(--muted); font-family:'Syne',sans-serif; font-weight:600; font-size:13px; border-radius:8px; cursor:pointer; transition:all .2s; }
.auth-tab.active { background:var(--card); color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.auth-form { display:none; flex-direction:column; gap:14px; }
.auth-form.active { display:flex; }
.a-label { font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; display:block; }
.a-input-wrap { position:relative; }
.a-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:15px; pointer-events:none; }
.a-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 13px 11px 40px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s,box-shadow .2s; }
.a-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(124,106,255,.12); }
.a-input::placeholder { color:rgba(107,107,138,.5); }
.a-btn { width:100%; padding:12px; border:none; border-radius:10px; background:linear-gradient(135deg,var(--accent),#9c6aff); color:#fff; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:opacity .2s,transform .15s; box-shadow:0 4px 18px rgba(124,106,255,.3); margin-top:4px; }
.a-btn:hover:not(:disabled) { opacity:.9; transform:translateY(-1px); }
.a-btn:disabled { opacity:.6; cursor:not-allowed; }
.a-err { font-size:12px; color:#ff5e7d; text-align:center; min-height:16px; }

/* ── APP LAYOUT ── */
#app { display:none; height:100vh; flex-direction:row; }
#app.show { display:flex; }

/* Server sidebar */
.server-bar {
  width: 64px; background: var(--sidebar);
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 0; gap: 8px; border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.server-logo { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; box-shadow:0 0 20px rgba(124,106,255,.3); margin-bottom:4px; }
.server-sep { width:32px; height:1px; background:var(--border); margin:4px 0; }
.server-icon { width:44px; height:44px; background:var(--surface); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; transition:all .2s; color:var(--muted); border:1px solid var(--border); }
.server-icon:hover { border-radius:14px; background:var(--accent); color:#fff; }
.server-icon.active { border-radius:14px; background:var(--accent); color:#fff; border-color:var(--accent); }

/* Channels sidebar */
.channels-bar {
  width: 220px; background: var(--sidebar);
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.channels-header {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.channels-header-name { font-family:'Syne',sans-serif; font-weight:700; font-size:14px; }
.channels-header-icon { color:var(--muted); cursor:pointer; font-size:18px; transition:color .2s; }
.channels-header-icon:hover { color:var(--text); }
.channels-section { padding: 14px 8px 4px; }
.channels-section-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; padding:0 6px; display:flex; align-items:center; justify-content:space-between; }
.channels-section-label span { cursor:pointer; font-size:16px; transition:color .2s; }
.channels-section-label span:hover { color:var(--text); }
.channel-item {
  display: flex; align-items: center; gap:8px;
  padding: 6px 8px; border-radius: 8px; cursor: pointer;
  color: var(--muted); font-size: 14px;
  transition: all .15s; margin: 1px 0;
  position: relative;
}
.channel-item:hover { background: var(--surface); color: var(--text); }
.channel-item.active { background: rgba(124,106,255,.15); color: var(--text); }
.channel-item.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:60%; background:var(--accent); border-radius:0 3px 3px 0; }
.channel-hash { font-size:16px; color:var(--muted); }
.channel-item.active .channel-hash, .channel-item:hover .channel-hash { color:var(--text); }
.channel-item .unread { margin-left:auto; width:7px; height:7px; border-radius:50%; background:var(--accent2); flex-shrink:0; }
.channels-bar-footer {
  margin-top: auto; padding: 10px 8px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.user-avatar-small { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; position:relative; cursor:pointer; }
.user-avatar-small .status-dot { position:absolute; bottom:0; right:0; width:9px; height:9px; border-radius:50%; background:var(--online); border:2px solid var(--sidebar); }
.user-info-small { flex:1; min-width:0; }
.user-name-small { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-tag-small { font-size:11px; color:var(--muted); }
.logout-icon { color:var(--muted); cursor:pointer; font-size:16px; padding:4px; border-radius:6px; transition:all .2s; }
.logout-icon:hover { color:#ff5e7d; background:rgba(255,94,125,.1); }

/* Main chat */
.chat-main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.chat-header {
  height: 52px; padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); flex-shrink: 0;
}
.chat-header-hash { font-size:20px; color:var(--muted); }
.chat-header-name { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; }
.chat-header-sep { width:1px; height:20px; background:var(--border); margin:0 4px; }
.chat-header-desc { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chat-header-actions { margin-left:auto; display:flex; gap:8px; }
.header-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:18px; padding:4px 6px; border-radius:6px; transition:all .2s; }
.header-btn:hover { color:var(--text); background:var(--surface); }

/* Messages */
.messages-area { flex:1; overflow-y:auto; padding:16px 0; display:flex; flex-direction:column; }
.messages-area::-webkit-scrollbar { width:4px; }
.messages-area::-webkit-scrollbar-track { background:transparent; }
.messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
.welcome-msg { padding:24px 20px 16px; }
.welcome-icon { width:60px; height:60px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:18px; display:flex; align-items:center; justify-content:center; font-size:28px; margin-bottom:16px; }
.welcome-title { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; margin-bottom:6px; }
.welcome-sub { color:var(--muted); font-size:14px; line-height:1.6; }
.msg-day-sep { display:flex; align-items:center; gap:12px; padding:8px 20px; margin:4px 0; }
.msg-day-line { flex:1; height:1px; background:var(--border); }
.msg-day-text { font-size:11px; color:var(--muted); font-weight:500; white-space:nowrap; }
.message {
  display: flex; gap: 12px;
  padding: 3px 20px;
  transition: background .1s;
  animation: msgIn .2s ease both;
}
@keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.message:hover { background: var(--msg-hover); }
.message.grouped { padding-top:1px; padding-bottom:1px; }
.msg-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; margin-top:2px; cursor:pointer; }
.msg-avatar.hidden { visibility:hidden; }
.msg-body { flex:1; min-width:0; }
.msg-meta { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
.msg-author { font-size:14px; font-weight:600; cursor:pointer; }
.msg-author:hover { text-decoration:underline; }
.msg-author.me { color:var(--accent); }
.msg-time { font-size:11px; color:var(--muted); }
.msg-text { font-size:14px; line-height:1.55; color:rgba(238,238,255,.85); word-break:break-word; }
.msg-text.grouped { margin-top:0; }
.typing-indicator { padding:4px 20px 8px; display:flex; align-items:center; gap:8px; min-height:28px; }
.typing-dots { display:flex; gap:3px; }
.typing-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:typeDot 1.2s ease infinite; }
.typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typeDot { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-4px);opacity:1} }
.typing-text { font-size:12px; color:var(--muted); }

/* Input */
.chat-input-area { padding:0 16px 16px; flex-shrink:0; }
.chat-input-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: flex-end; gap: 8px;
  padding: 8px 8px 8px 14px;
  transition: border-color .2s;
}
.chat-input-box:focus-within { border-color: rgba(124,106,255,.4); }
.chat-input {
  flex:1; background:transparent; border:none; outline:none;
  color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
  resize:none; max-height:120px; line-height:1.5; padding:4px 0;
}
.chat-input::placeholder { color:var(--muted); }
.input-actions { display:flex; gap:4px; align-items:center; }
.input-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px; padding:4px; border-radius:6px; transition:all .2s; line-height:1; }
.input-btn:hover { color:var(--accent); background:rgba(124,106,255,.1); }
.send-btn { background:var(--accent); border:none; color:#fff; cursor:pointer; width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .2s; flex-shrink:0; }
.send-btn:hover { background:#9c6aff; transform:scale(1.05); }
.send-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

/* Members sidebar */
.members-bar {
  width: 200px; background: var(--sidebar);
  border-left: 1px solid var(--border);
  padding: 16px 8px; overflow-y:auto;
  flex-shrink:0;
}
.members-bar::-webkit-scrollbar { width:3px; }
.members-bar::-webkit-scrollbar-thumb { background:var(--border); border-radius:99px; }
.members-section-label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1px; padding:0 8px; margin-bottom:6px; }
.member-item { display:flex; align-items:center; gap:8px; padding:5px 8px; border-radius:8px; cursor:pointer; transition:background .15s; }
.member-item:hover { background:var(--surface); }
.member-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; position:relative; }
.member-status { position:absolute; bottom:0; right:0; width:9px; height:9px; border-radius:50%; border:2px solid var(--sidebar); }
.member-status.online { background:var(--online); }
.member-status.offline { background:var(--muted); }
.member-name { font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.member-item:hover .member-name { color:var(--text); }
.members-sep { margin:12px 0 6px; }

/* Toast */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:10px 18px; font-size:13px; display:flex; align-items:center; gap:8px; box-shadow:0 16px 40px rgba(0,0,0,.5); transition:transform .3s cubic-bezier(.22,1,.36,1),opacity .3s; opacity:0; z-index:200; white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

@media(max-width:900px){ .members-bar{display:none} }
@media(max-width:600px){ .channels-bar{display:none} .server-bar{display:none} }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-bg">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">💬</div>
      <span class="auth-logo-text">NexTalk</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="authTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="authTab('register')">Registrarse</button>
    </div>
    <div class="auth-form active" id="af-login">
      <div>
        <label class="a-label">Correo</label>
        <div class="a-input-wrap">
          <span class="a-icon">✉</span>
          <input class="a-input" type="email" id="l-email" placeholder="tu@correo.com">
        </div>
      </div>
      <div>
        <label class="a-label">Contraseña</label>
        <div class="a-input-wrap">
          <span class="a-icon">🔒</span>
          <input class="a-input" type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>
      <div class="a-err" id="l-err"></div>
      <button class="a-btn" id="btn-login" onclick="doLogin()">Entrar</button>
    </div>
    <div class="auth-form" id="af-register">
      <div>
        <label class="a-label">Usuario</label>
        <div class="a-input-wrap">
          <span class="a-icon">👤</span>
          <input class="a-input" type="text" id="r-user" placeholder="cooluser123" oninput="this.value=this.value.replace(/[^a-zA-Z0-9_]/g,'').toLowerCase()">
        </div>
      </div>
      <div>
        <label class="a-label">Correo</label>
        <div class="a-input-wrap">
          <span class="a-icon">✉</span>
          <input class="a-input" type="email" id="r-email" placeholder="tu@correo.com">
        </div>
      </div>
      <div>
        <label class="a-label">Contraseña</label>
        <div class="a-input-wrap">
          <span class="a-icon">🔒</span>
          <input class="a-input" type="password" id="r-pass" placeholder="Mínimo 8 caracteres" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
      </div>
      <div class="a-err" id="r-err"></div>
      <button class="a-btn" id="btn-register" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Server bar -->
  <div class="server-bar">
    <div class="server-logo" title="NexTalk">💬</div>
    <div class="server-sep"></div>
    <div class="server-icon active" title="General">🏠</div>
    <div class="server-icon" title="Gaming">🎮</div>
    <div class="server-icon" title="Música">🎵</div>
    <div class="server-icon" title="Arte">🎨</div>
  </div>

  <!-- Channels -->
  <div class="channels-bar">
    <div class="channels-header">
      <span class="channels-header-name">NexTalk</span>
      <span class="channels-header-icon" title="Configuración">⚙</span>
    </div>
    <div style="overflow-y:auto;flex:1">
      <div class="channels-section">
        <div class="channels-section-label">Texto <span title="Crear canal">+</span></div>
        <div style="margin-top:6px" id="channels-list"></div>
      </div>
      <div class="channels-section" style="margin-top:8px">
        <div class="channels-section-label">Voz <span>+</span></div>
        <div style="margin-top:6px">
          <div class="channel-item"><span>🔊</span> General</div>
          <div class="channel-item"><span>🔊</span> Gaming</div>
        </div>
      </div>
    </div>
    <div class="channels-bar-footer">
      <div class="user-avatar-small" id="my-avatar">
        <div class="status-dot"></div>
      </div>
      <div class="user-info-small">
        <div class="user-name-small" id="my-username">Usuario</div>
        <div class="user-tag-small">En línea</div>
      </div>
      <span class="logout-icon" onclick="doLogout()" title="Cerrar sesión">⏏</span>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-main">
    <div class="chat-header">
      <span class="chat-header-hash">#</span>
      <span class="chat-header-name" id="current-channel-name">general</span>
      <div class="chat-header-sep"></div>
      <span class="chat-header-desc" id="current-channel-desc">Bienvenido al canal general 👋</span>
      <div class="chat-header-actions">
        <button class="header-btn" title="Buscar">🔍</button>
        <button class="header-btn" title="Miembros" onclick="toggleMembers()">👥</button>
      </div>
    </div>
    <div class="messages-area" id="messages-area">
      <div class="welcome-msg">
        <div class="welcome-icon">#</div>
        <div class="welcome-title" id="welcome-title">Bienvenido a #general</div>
        <div class="welcome-sub">Este es el inicio del canal. ¡Di hola! 👋</div>
      </div>
    </div>
    <div class="typing-indicator" id="typing-indicator"></div>
    <div class="chat-input-area">
      <div class="chat-input-box">
        <textarea class="chat-input" id="msg-input" placeholder="Mensaje en #general" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this);sendTyping()"></textarea>
        <div class="input-actions">
          <button class="input-btn" title="Emoji">😊</button>
          <button class="input-btn" title="Adjunto">📎</button>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Members -->
  <div class="members-bar" id="members-bar">
    <div class="members-section-label">En línea — <span id="online-count">0</span></div>
    <div id="members-online"></div>
    <div class="members-sep">
      <div class="members-section-label">Desconectados</div>
    </div>
    <div id="members-offline"></div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-icon">✅</span><span id="toast-msg"></span></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://ohawlfpklbrpdyaxoifs.supabase.co',

);

// State
let currentUser = null;
let currentChannel = 'general';
let messagesChannel = null;
let typingTimeout = null;
let lastMsgUserId = null;

const CHANNELS = [
  { id:'general', name:'general', desc:'Bienvenido al canal general 👋' },
  { id:'presentaciones', name:'presentaciones', desc:'¡Preséntate a la comunidad!' },
  { id:'random', name:'random', desc:'Conversaciones random 🎲' },
  { id:'gaming', name:'gaming', desc:'Habla sobre videojuegos 🎮' },
  { id:'musica', name:'musica', desc:'Comparte tu música favorita 🎵' },
];

// ── INIT ──
sb.auth.getSession().then(({ data }) => {
  if (data.session) initApp(data.session.user);
});
sb.auth.onAuthStateChange((e, session) => {
  if (e === 'SIGNED_IN') initApp(session.user);
  if (e === 'SIGNED_OUT') showAuth();
});

function initApp(user) {
  currentUser = user;
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.add('show');
  const uname = user.user_metadata?.username || user.email.split('@')[0];
  document.getElementById('my-username').textContent = uname;
  document.getElementById('my-avatar').innerHTML = `<span>${uname[0].toUpperCase()}</span><div class="status-dot"></div>`;
  renderChannels();
  switchChannel('general');
  setupDatabase();
}

function showAuth() {
  document.getElementById('app').classList.remove('show');
  document.getElementById('auth-screen').style.display = 'flex';
}

// ── AUTH ──
function authTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('af-login').classList.toggle('active', tab==='login');
  document.getElementById('af-register').classList.toggle('active', tab==='register');
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  if (!email||!pass) { err.textContent='Completa todos los campos'; return; }
  document.getElementById('btn-login').disabled = true;
  document.getElementById('btn-login').textContent = 'Entrando...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Entrar';
  if (error) { err.textContent = translateErr(error.message); return; }
  err.textContent = '';
}

async function doRegister() {
  const user = document.getElementById('r-user').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass = document.getElementById('r-pass').value;
  const err = document.getElementById('r-err');
  if (!user||!email||!pass) { err.textContent='Completa todos los campos'; return; }
  if (user.length < 3) { err.textContent='Usuario muy corto'; return; }
  if (pass.length < 8) { err.textContent='Contraseña mínimo 8 caracteres'; return; }
  document.getElementById('btn-register').disabled = true;
  document.getElementById('btn-register').textContent = 'Creando...';
  const { error } = await sb.auth.signUp({ email, password: pass, options:{ data:{ username: user } } });
  document.getElementById('btn-register').disabled = false;
  document.getElementById('btn-register').textContent = 'Crear cuenta';
  if (error) { err.textContent = translateErr(error.message); return; }
  err.textContent = '';
  showToast('¡Cuenta creada! Revisa tu correo 📧', 'success');
}

async function doLogout() {
  await sb.auth.signOut();
}

// ── CHANNELS ──
function renderChannels() {
  const list = document.getElementById('channels-list');
  list.innerHTML = CHANNELS.map(c => `
    <div class="channel-item ${c.id===currentChannel?'active':''}" id="ch-${c.id}" onclick="switchChannel('${c.id}')">
      <span class="channel-hash">#</span> ${c.name}
    </div>
  `).join('');
}

function switchChannel(chId) {
  currentChannel = chId;
  const ch = CHANNELS.find(c=>c.id===chId);
  document.getElementById('current-channel-name').textContent = ch.name;
  document.getElementById('current-channel-desc').textContent = ch.desc;
  document.getElementById('welcome-title').textContent = `Bienvenido a #${ch.name}`;
  document.getElementById('msg-input').placeholder = `Mensaje en #${ch.name}`;
  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`ch-${chId}`);
  if (el) el.classList.add('active');
  // Clear messages
  const area = document.getElementById('messages-area');
  area.innerHTML = `<div class="welcome-msg">
    <div class="welcome-icon">#</div>
    <div class="welcome-title">Bienvenido a #${ch.name}</div>
    <div class="welcome-sub">Este es el inicio del canal. ¡Di hola! 👋</div>
  </div>`;
  lastMsgUserId = null;
  loadMessages();
  subscribeToChannel();
}

// ── DATABASE SETUP ──
async function setupDatabase() {
  // Try to create table via RPC — if fails, show instructions
  const { error } = await sb.from('messages').select('id').limit(1);
  if (error && error.code === '42P01') {
    showToast('⚠️ Configura la base de datos (ver instrucciones abajo)', 'error');
    showDbInstructions();
  }
}

function showDbInstructions() {
  const area = document.getElementById('messages-area');
  area.innerHTML += `
    <div style="margin:20px;padding:20px;background:rgba(124,106,255,.1);border:1px solid rgba(124,106,255,.3);border-radius:12px;font-size:13px;line-height:1.8;">
      <strong style="color:var(--accent)">⚙️ Último paso — Crear tabla en Supabase:</strong><br><br>
      1. Ve a <strong>supabase.com</strong> → tu proyecto → <strong>SQL Editor</strong><br>
      2. Pega este código y clic en <strong>Run</strong>:<br><br>

// ── MESSAGES ──
async function loadMessages() {
  const { data, error } = await sb.from('messages')
    .select('*')
    .eq('channel', currentChannel)
    .order('created_at', { ascending: true })
    .limit(50);
  if (error) return;
  data.forEach((msg, i) => appendMessage(msg, i > 0 && data[i-1]?.user_id === msg.user_id));
  scrollToBottom();
}

function appendMessage(msg, grouped = false) {
  const area = document.getElementById('messages-area');
  const isMe = currentUser && msg.user_id === currentUser.id;
  const time = new Date(msg.created_at).toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
  const div = document.createElement('div');
  div.className = `message${grouped?' grouped':''}`;
  div.innerHTML = grouped
    ? `<div class="msg-avatar hidden"></div>
       <div class="msg-body"><div class="msg-text">${escHtml(msg.content)}</div></div>`
    : `<div class="msg-avatar">${msg.username[0].toUpperCase()}</div>
       <div class="msg-body">
         <div class="msg-meta">
           <span class="msg-author${isMe?' me':''}">${escHtml(msg.username)}</span>
           <span class="msg-time">${time}</span>
         </div>
         <div class="msg-text">${escHtml(msg.content)}</div>
       </div>`;
  area.appendChild(div);
}

function subscribeToChannel() {
  if (messagesChannel) sb.removeChannel(messagesChannel);
  messagesChannel = sb.channel(`chat:${currentChannel}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `channel=eq.${currentChannel}`
    }, payload => {
      const msg = payload.new;
      const grouped = lastMsgUserId === msg.user_id;
      appendMessage(msg, grouped);
      lastMsgUserId = msg.user_id;
      scrollToBottom();
    })
    .subscribe();
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !currentUser) return;
  const uname = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
  input.value = '';
  autoResize(input);
  const { error } = await sb.from('messages').insert({
    channel: currentChannel,
    user_id: currentUser.id,
    username: uname,
    content: content
  });
  if (error) showToast('Error al enviar: ' + error.message, 'error');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendTyping() {
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {}, 2000);
}

function scrollToBottom() {
  const area = document.getElementById('messages-area');
  setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleMembers() {
  const bar = document.getElementById('members-bar');
  bar.style.display = bar.style.display === 'none' ? '' : 'none';
}

// ── HELPERS ──
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function translateErr(msg) {
  if (msg.includes('Invalid login')) return 'Correo o contraseña incorrectos';
  if (msg.includes('Email not confirmed')) return 'Confirma tu correo primero';
  if (msg.includes('already registered')) return 'Este correo ya está registrado';
  if (msg.includes('Password should')) return 'Contraseña mínimo 6 caracteres';
  return msg;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').textContent = type==='success'?'✅':'⚠️';
  t.className = 'toast show';
  setTimeout(() => t.classList.remove('show'), 4000);
}
</script>
